name: Update and deploy lottery dashboard

on:
  workflow_dispatch:
  schedule:
    # Beijing time 08:10, 20:50 and 22:10. The last run refreshes results after drawing.
    - cron: "10 0 * * *"
    - cron: "50 12 * * *"
    - cron: "10 14 * * *"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ticai-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch official draw history (preserve verified cache on failure)
        run: python src/fetch_draws.py
      - name: Generate dashboard and copy-ready results
        run: python src/generate_dashboard.py
      - name: Save refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/draws.json docs/assets/data/dashboard.json
          git diff --cached --quiet || git commit -m "chore(data): refresh lottery dashboard"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
