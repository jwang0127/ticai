name: Update and deploy lottery dashboard

on:
  workflow_dispatch:
    inputs:
      games:
        description: "要更新的玩法"
        required: true
        default: "dlt,pl3,pl5,fc3d,qxc,ssq,kl8"
        type: choice
        options:
          - "dlt,pl3,pl5,fc3d,qxc,ssq,kl8"
          - "dlt"
          - "pl3,pl5,fc3d,qxc,ssq,kl8"
  schedule:
    # PL3/PL5: daily at 22:10 Beijing, after the 21:25 draw.
    - cron: "10 14 * * *"
    # DLT: 08:10 Beijing on Sun/Tue/Fri, one day before Mon/Wed/Sat draws.
    - cron: "10 0 * * 0,2,5"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ticai-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Select update scope
        id: scope
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "games=${{ inputs.games }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "10 0 * * 0,2,5" ]]; then
            echo "games=dlt" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "games=pl3,pl5,fc3d,qxc,ssq,kl8" >> "$GITHUB_OUTPUT"
          else
            echo "games=dlt,pl3,pl5,fc3d,qxc,ssq,kl8" >> "$GITHUB_OUTPUT"
          fi
      - name: Fetch official draw history (preserve verified cache on failure)
        if: github.event_name != 'push'
        run: python src/fetch_draws.py --games "${{ steps.scope.outputs.games }}" --history-limit 2000
      - name: Generate dashboard and copy-ready results
        if: github.event_name != 'push'
        run: python src/generate_dashboard.py --games "${{ steps.scope.outputs.games }}"
      - name: Save refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/draws.json docs/assets/data/dashboard.json data/processed/model_reviews.json
          git diff --cached --quiet || git commit -m "chore(data): refresh lottery dashboard"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
